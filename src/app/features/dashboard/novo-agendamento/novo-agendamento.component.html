
<div class="card-blue form-container">
  <h2 class="form-title">Agendar Consulta</h2>

  <div class="form-grid">
    <div class="form-left">

      <div class="form-group">
  <label class="label">Profissional</label>
  <p-select
    [options]="profissionaisOpcoes"
    [(ngModel)]="idProfissionalSelecionado"
    optionLabel="label"
    optionValue="value"
    placeholder="Selecione o profissional"
    styleClass="w-full input-prime"
    (onChange)="onProfissionalChange()">
  </p-select>
</div>
  @if (idProfissionalSelecionado === -1) {
  <div class="form-group">
    <input type="text" class="input-field" placeholder="Nome do profissional" [(ngModel)]="novoProfissional.nomeProfissional" />
  </div>
}
      <div class="form-group">
  <label class="label">Especialidade</label>
  <p-select 
    [options]="especialidadesOpcoes" 
    [(ngModel)]="especialidade" 
    optionLabel="label" 
    optionValue="value"
    placeholder="Selecione a especialidade" 
    styleClass="w-full input-prime">
  </p-select>
</div>

<div class="form-group">
  <label class="label">Tipo de Consulta</label>
  <p-select 
    [options]="tiposConsultaOpcoes" 
    [(ngModel)]="tipoConsulta" 
    optionLabel="label" 
    optionValue="value"
    placeholder="Selecione o tipo" 
    styleClass="w-full input-prime">
  </p-select>
</div>

      <div class="form-group full-width">
        <label class="label">Endereço</label>
        <input type="text" class="input-field" placeholder="Ex: Clínica Sonhare Rua das..." [(ngModel)]="endereco" />
      </div>

      <div class="form-group full-width">
        <label class="label">Motivo da Consulta</label>
        <textarea class="input-field textarea" placeholder="Descreva o motivo da consulta" [(ngModel)]="motivo"></textarea>
      </div>
    </div>

    <div class="form-right">
      <div class="form-group">
        <label class="label">Data e Hora da Consulta</label>
        <p-datepicker 
          [(ngModel)]="dataAgendamento" 
          [showIcon]="true" 
          [showTime]="true" 
          hourFormat="24"
          dateFormat="dd/mm/yy"
          placeholder="Selecione a data e horário"
          styleClass="w-full">
        </p-datepicker>
      </div>

      <button class="btn-sync" (click)="sincronizarGoogle()">
  <i class="pi pi-sync"></i>
  <strong>Sincronizar com Google Agenda</strong>
</button>
    </div>
  </div>

  <div class="form-footer">
    <button class="btn-primary" (click)="salvar()">
      <i class="pi pi-save"></i>
      Agendar Consulta
    </button>
  </div>
</div>

<!-- Dialog de Sincronização Google -->
<p-dialog 
  header="Sugestões do Google Agenda" 
  [(visible)]="exibirModalGoogle" 
  [modal]="true" 
  [style]="{ width: '50vw' }" 
  [draggable]="false" 
  [resizable]="false">
  
  <p *ngIf="carregandoGoogle">Buscando eventos no seu calendário...</p>
  
  <div *ngIf="!carregandoGoogle && sugestoesGoogle.length === 0">
    <p>Nenhum evento encontrado no Google Calendar.</p>
  </div>

  <div *ngIf="!carregandoGoogle && sugestoesGoogle.length > 0">
    <div class="card mb-3" *ngFor="let evento of sugestoesGoogle" style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <strong>{{ evento.especialidade }}</strong> <br/> 
          <small><i class="pi pi-calendar"></i> {{ evento.dataAgendamento | date:'dd/MM/yyyy' }} às {{ evento.horaAgendamento }}</small>
        </div>
        <button class="p-button p-button-sm p-button-outlined" (click)="usarSugestaoGoogle(evento)">
          <i class="pi pi-check"></i> Usar
        </button>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button icon="pi pi-times" (click)="exibirModalGoogle = false" label="Cancelar" styleClass="p-button-text" severity="danger"></p-button>
  </ng-template>
</p-dialog>
