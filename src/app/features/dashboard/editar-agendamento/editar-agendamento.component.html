<div class="breadcrumb">
  <span routerLink="/agendamentos" class="link">Voltar</span>
  <span> / Agendamento / </span>
  <span class="current">Editar</span>
</div>

<div class="card-blue form-container">
  <h2 class="form-title">{{ especialidade }}</h2>

  <div class="form-grid">
    <div class="form-column">

       <div class="form-group">
  <label class="label">Profissional</label>
  <p-select
    [options]="profissionaisOpcoes"
    [(ngModel)]="idProfissionalSelecionado"
    optionLabel="label"
    optionValue="value"
    placeholder="Selecione o profissional"
    styleClass="w-full input-prime">
  </p-select>
</div>
      
      <div class="form-group">
        <label class="label">Especialidade</label>
        <p-select 
          [options]="especialidadesOpcoes" 
          [(ngModel)]="especialidade" 
          optionLabel="label" 
          optionValue="value"
          placeholder="Selecione a especialidade" 
          styleClass="w-full input-prime">
        </p-select>
      </div>


      <div class="form-group">
        <label class="label">Tipo de Consulta</label>
        <p-select 
          [options]="tiposConsultaOpcoes" 
          [(ngModel)]="tipoConsulta" 
          optionLabel="label" 
          optionValue="value"
          placeholder="Selecione o tipo" 
          styleClass="w-full input-prime">
        </p-select>
      </div>

      <div class="form-group">
        <label class="label">Endereço</label>
        <input type="text" class="input-field" [(ngModel)]="endereco" />
      </div>
    </div>

    <div class="form-column">
      <div class="form-group">
        <label class="label">Data e Hora da Consulta</label>
        <p-datepicker 
          [(ngModel)]="dataAgendamento" 
          [showIcon]="true" 
          [showTime]="true" 
          hourFormat="24"
          dateFormat="dd/mm/yy"
          styleClass="datepicker-custom w-full">
        </p-datepicker>
      </div>

      <div class="extra-actions">
        <button class="btn-outline" routerLink="../documentos">
          <i class="pi pi-file-plus"></i> Adicionar Documentos
        </button>
        <button class="btn-outline">
          <i class="pi pi-heart-fill"></i> Adicionar Diagnóstico
        </button>
      </div>

    </div>

    <div class="form-group full-width">
      <label class="label">Motivo da Consulta</label>
      <textarea class="input-field textarea" [(ngModel)]="motivo"></textarea>
    </div>
  </div>

  <div class="form-footer">
    <button class="btn-primary" (click)="salvar()">
      <i class="pi pi-save"></i>
      Salvar Alterações
    </button>
  </div>
</div>
